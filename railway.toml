# Railway service config for the API (apps/server).
# Create a Railway project, link this repo, set root to monorepo root.
# Set Dockerfile path: apps/server/Dockerfile

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/server/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
